[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short --disable-warnings
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

markers =
    unit: Unit tests (mark with @pytest.mark.unit)
    integration: Integration tests (mark with @pytest.mark.integration)
    security: Security and validation tests (mark with @pytest.mark.security)
    performance: Performance and load tests (mark with @pytest.mark.performance)
    slow: Slow running tests (mark with @pytest.mark.slow)
